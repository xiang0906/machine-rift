<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Rift</title>
    <style>
        :root {
            --bg: #07111f;
            --panel: #101c31;
            --accent: #4dd0e1;
            --accent2: #ff8a65;
            --text: #f5f7fb;
            --muted: #9db0c7;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, var(--bg), #15243e);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(900px, 100%);
            background: rgba(16, 28, 49, 0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            overflow: hidden;
        }

        .hero {
            padding: 40px;
            display: grid;
            gap: 20px;
        }

        .badge {
            display: inline-block;
            width: fit-content;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(77, 208, 225, 0.15);
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 0.04em;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.1;
        }

        p { margin: 0; color: var(--muted); line-height: 1.7; }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent), #2bb6cb);
            color: #051018;
        }

        .btn-secondary {
            background: rgba(255,138,101,0.16);
            color: var(--accent2);
            border: 1px solid rgba(255,138,101,0.2);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            padding: 24px 40px 40px;
            background: rgba(255,255,255,0.03);
        }

        .info-box {
            padding: 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .info-box h3 { margin: 0 0 8px; font-size: 1rem; }
        .info-box span { color: var(--muted); font-size: 0.95rem; }

        @media (max-width: 700px) {
            .hero { padding: 28px; }
            .info-grid { grid-template-columns: 1fr; padding: 20px 28px 28px; }
        }
    </style>
</head>
<body>
    <main class="card">
        <section class="hero">
            <span class="badge">Machine Rift · MVP</span>
            <h1>塔防遊戲後端與前端入口已就緒</h1>
            <p>
                這是一個以 Spring Boot 提供 API、前端入口頁作為啟動畫面的 MVP 版本。
                你可以先用它確認後端服務已正常啟動，再逐步補上遊戲畫面與前後端串接。
            </p>
            <div class="actions">
                <a class="btn btn-primary" href="/swagger-ui.html">查看 API 文件</a>
                <a class="btn btn-secondary" href="/api/players">測試玩家 API</a>
            </div>
        </section>

        <section class="info-grid">
            <div class="info-box">
                <h3>後端服務</h3>
                <span>Spring Boot 3 + MySQL + JPA</span>
            </div>
            <div class="info-box">
                <h3>資料模型</h3>
                <span>玩家、關卡、塔、防禦戰績</span>
            </div>
            <div class="info-box">
                <h3>下一步</h3>
                <span>接上 Canvas 遊戲畫面與 REST API</span>
            </div>
        </section>
    </main>
</body>
</html>
