<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Rift</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #101c31;
    --panel2: #16233b;
    --accent: #4dd0e1;
    --accent2: #ff8a65;
    --text: #f5f7fb;
    --muted: #9db0c7;
    --good: #4caf50;
    --bad: #ff5252;
  }
  * { box-sizing: border-box; }
  @keyframes bgPan {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, var(--bg), #15243e, #0a1830, var(--bg));
    background-size: 300% 300%;
    animation: bgPan 22s ease-in-out infinite;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }
  #bgFx {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    position: relative;
    z-index: 1;
    width: min(760px, 100%);
    background: rgba(16, 28, 49, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    padding: 32px;
    animation: fadeInUp 0.55s ease-out;
  }
  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 8px rgba(77,208,225,0.35), 0 0 22px rgba(77,208,225,0.15); }
    50% { text-shadow: 0 0 16px rgba(77,208,225,0.65), 0 0 38px rgba(77,208,225,0.35); }
  }
  h1 {
    margin: 0 0 4px;
    font-size: 2.2rem;
    letter-spacing: 0.03em;
    background: linear-gradient(90deg, var(--text), var(--accent), var(--text));
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: titleGlow 3.2s ease-in-out infinite;
  }
  h2 { margin: 0 0 16px; font-size: 1.3rem; color: var(--accent); }
  p { color: var(--muted); line-height: 1.6; }
  .badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(77, 208, 225, 0.15);
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    animation: fadeInUp 0.5s ease-out;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--panel2);
    color: var(--text);
    font-size: 1rem;
    margin-bottom: 12px;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 999px;
    padding: 11px 22px;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .btn-primary { background: linear-gradient(90deg, var(--accent), #2bb6cb); color: #051018; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .error-text { color: var(--bad); min-height: 20px; font-size: 0.9rem; }
  .stage-list, .rank-list { display: grid; gap: 10px; margin-bottom: 16px; }
  .stage-card {
    background: var(--panel2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.2s;
  }
  .stage-card:hover { border-color: var(--accent); }
  .stage-card .name { font-weight: 700; }
  .stage-card .meta { color: var(--muted); font-size: 0.85rem; }
  .ranking-intro { margin: -6px 0 18px; }
  .ranking-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .ranking-stat {
    background: linear-gradient(145deg, rgba(77,208,225,0.12), rgba(255,255,255,0.03));
    border: 1px solid rgba(77,208,225,0.18);
    border-radius: 14px;
    padding: 14px;
  }
  .ranking-stat span { display: block; color: var(--muted); font-size: 0.78rem; margin-bottom: 5px; }
  .ranking-stat b { color: var(--text); font-size: 1.25rem; }
  .rank-podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 12px;
    margin: 12px 0 26px;
    min-height: 176px;
  }
  .podium-card {
    flex: 1;
    max-width: 190px;
    min-width: 0;
    text-align: center;
    padding: 18px 10px 14px;
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.1);
  }
  .podium-card.rank-1 {
    order: 2;
    padding-top: 24px;
    border-color: rgba(255,213,79,0.55);
    box-shadow: 0 12px 32px rgba(255,193,7,0.12);
    transform: translateY(-12px);
  }
  .podium-card.rank-2 { order: 1; border-color: rgba(207,216,220,0.4); }
  .podium-card.rank-3 { order: 3; border-color: rgba(205,127,50,0.45); }
  .podium-medal { font-size: 1.6rem; margin-bottom: 8px; }
  .rank-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    background: linear-gradient(135deg, var(--accent), #536dfe);
    color: #051018;
    font-weight: 900;
    font-size: 1.05rem;
    box-shadow: 0 6px 18px rgba(77,208,225,0.2);
  }
  .podium-card .rank-avatar { margin: 0 auto 9px; width: 52px; height: 52px; }
  .podium-name {
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .podium-score { color: var(--accent); font-size: 1.12rem; font-weight: 900; margin-top: 5px; }
  .podium-meta { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }
  .rank-section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 10px;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .rank-row {
    display: grid;
    grid-template-columns: 34px 44px minmax(120px, 1fr) auto auto;
    gap: 12px;
    align-items: center;
    background: var(--panel2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 0.9rem;
  }
  .rank-position { color: var(--muted); font-weight: 900; text-align: center; }
  .rank-name { color: var(--text); font-weight: 800; }
  .rank-detail { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }
  .rank-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .rank-tag {
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    color: var(--muted);
    font-size: 0.72rem;
  }
  .rank-tag.win { background: rgba(76,175,80,0.14); color: #81c784; }
  .rank-tag.lose { background: rgba(255,82,82,0.12); color: #ff8a80; }
  .rank-score { color: var(--accent); font-weight: 900; font-size: 1.02rem; text-align: right; }
  .ranking-empty {
    text-align: center;
    padding: 34px 16px;
    border: 1px dashed rgba(255,255,255,0.14);
    border-radius: 14px;
    color: var(--muted);
  }
  @media (max-width: 620px) {
    .ranking-stats { grid-template-columns: 1fr; }
    .rank-podium { gap: 6px; min-height: 158px; }
    .podium-card { padding: 14px 7px 12px; }
    .rank-row { grid-template-columns: 28px 40px 1fr auto; gap: 8px; }
    .rank-row .rank-badges { display: none; }
  }
  #hud {
    display: flex;
    gap: 22px;
    margin-bottom: 10px;
    font-size: 0.95rem;
    flex-wrap: wrap;
  }
  #hud span b { color: var(--accent); }
  #hud .hp-low b { color: var(--bad); }
  #screen-game {
    width: min(1080px, 100%);
    padding: 24px;
  }
  .game-layout {
    display: grid;
    grid-template-columns: minmax(0, 700px) minmax(250px, 1fr);
    gap: 18px;
    align-items: start;
  }
  .game-board { min-width: 0; }
  #gameCanvas {
    display: block;
    width: 100%;
    max-width: 700px;
    aspect-ratio: 7 / 4;
    background: #0c1930;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: crosshair;
  }
  .game-controls {
    height: 400px;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    background: rgba(7,17,31,0.58);
  }
  .tower-panel-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 9px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .tower-panel-heading b { color: var(--text); font-size: 0.95rem; }
  .tower-heading-actions {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  #towerSortSelect {
    max-width: 118px;
    padding: 5px 24px 5px 8px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px;
    background: var(--panel2);
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }
  #towerSortSelect:focus {
    outline: 2px solid rgba(77,208,225,0.4);
    outline-offset: 1px;
  }
  #towerPanel {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-color: rgba(77,208,225,0.45) transparent;
    padding-right: 5px;
    min-height: 0;
    flex: 1;
  }
  .tower-btn {
    background: var(--panel2);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text);
    padding: 9px 11px;
    text-align: left;
    font-size: 0.78rem;
    width: 100%;
    min-width: 0;
    transition: background 0.18s, transform 0.18s, border-color 0.18s;
  }
  .tower-btn:hover { transform: translateX(-2px); background: rgba(255,255,255,0.08); }
  .tower-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .tower-title b {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.9rem;
  }
  .tower-role {
    flex: 0 0 auto;
    color: var(--muted);
    font-size: 0.7rem;
  }
  .tower-details {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    color: var(--muted);
  }
  .tower-cost { color: #ffd54f; font-weight: 800; }
  .tower-btn.selected {
    border-color: var(--accent) !important;
    background: rgba(77,208,225,0.14);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .tower-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .game-controls .btn-row { flex: 0 0 auto; margin-top: 10px; }
  .game-controls .btn-row button { flex: 1; padding: 9px 10px; }
  .game-controls .hint { flex: 0 0 auto; margin-top: 8px; }
  .hint { font-size: 0.85rem; color: var(--muted); margin-top: 10px; min-height: 18px; }
  @media (min-width: 961px) and (min-height: 620px) {
    body.game-active {
      align-items: center;
      padding: 12px;
      overflow: hidden;
    }
  }
  @media (max-width: 960px) {
    body.game-active { align-items: flex-start; }
    #screen-game { padding: 16px; }
    .game-layout { grid-template-columns: 1fr; gap: 10px; }
    .game-controls {
      height: auto;
      padding: 10px;
    }
    #towerPanel {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 0 6px;
      scroll-snap-type: x proximity;
    }
    .tower-btn {
      flex: 0 0 190px;
      width: 190px;
      scroll-snap-align: start;
    }
    .tower-btn:hover { transform: none; }
    .game-controls .btn-row button { flex: 0 1 auto; }
  }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(5,10,20,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  .overlay .card { text-align: center; }
  .result-win { color: var(--good); }
  .result-lose { color: var(--bad); }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<canvas id="bgFx"></canvas>

<div id="screen-start" class="card">
  <span class="badge">Machine Rift · Demo</span>
  <h1>Machine Rift</h1>
  <h2>玩家登入</h2>
  <p>登入後會載入你的關卡進度、解鎖內容與歷史戰績。</p>
  <input type="text" id="usernameInput" placeholder="帳號（可使用特殊符號，不可有空白）" maxlength="50" autocomplete="username">
  <input type="password" id="passwordInput" placeholder="密碼（至少 8 個字元）" maxlength="72" autocomplete="current-password">
  <div class="btn-row">
    <button class="btn-primary" id="btnLogin">登入</button>
  </div>
  <div class="error-text" id="startError"></div>
  <p class="hint">第一次遊玩、還沒有帳號？</p>
  <button class="btn-secondary" id="btnGoRegister">建立帳號</button>
</div>

<div id="screen-register" class="card" hidden>
  <span class="badge">Machine Rift · 新玩家</span>
  <h1>建立帳號</h1>
  <p>帳號建立後，關卡進度與戰績都會保存在這個帳號。</p>
  <input type="text" id="registerPlayerNameInput" placeholder="玩家顯示名稱" maxlength="100" autocomplete="nickname">
  <input type="text" id="registerUsernameInput" placeholder="帳號（可使用特殊符號，不可有空白）" maxlength="50" autocomplete="username">
  <input type="password" id="registerPasswordInput" placeholder="密碼（至少 8 個字元）" maxlength="72" autocomplete="new-password">
  <input type="password" id="registerPasswordConfirmInput" placeholder="再次輸入密碼" maxlength="72" autocomplete="new-password">
  <div class="btn-row">
    <button class="btn-primary" id="btnCreateAccount">建立並登入</button>
    <button class="btn-secondary" id="btnBackToLogin">返回登入</button>
  </div>
  <div class="error-text" id="registerError"></div>
</div>

<div id="screen-stages" class="card" hidden>
  <h2>選擇關卡 · <span id="currentPlayerName"></span></h2>
  <div class="stage-list" id="stageList"></div>
  <div class="btn-row">
    <button class="btn-primary" id="btnShowRanking">查看排行榜</button>
    <button class="btn-secondary" id="btnBackToStart">登出</button>
  </div>
</div>

<div id="screen-ranking" class="card" hidden>
  <span class="badge">裂隙榮耀榜</span>
  <h1>排行榜</h1>
  <p class="ranking-intro">每位玩家取最高分，同分時以較短遊玩時間優先。</p>
  <div class="ranking-stats" id="rankingStats"></div>
  <div class="rank-podium" id="rankPodium"></div>
  <div class="rank-section-title">
    <span>完整排名</span>
    <span>前 10 名</span>
  </div>
  <div class="rank-list" id="rankList"></div>
  <div class="btn-row">
    <button class="btn-secondary" id="btnBackFromRanking">返回</button>
  </div>
</div>

<div id="screen-game" class="card" hidden>
  <div id="hud">
    <span>金幣 <b id="hudGold">0</b></span>
    <span id="hudHpWrap">基地血量 <b id="hudHp">0</b></span>
    <span>分數 <b id="hudScore">0</b></span>
    <span>敵人 <b id="hudEnemies">0/0</b></span>
  </div>
  <div class="game-layout">
    <div class="game-board">
      <canvas id="gameCanvas" width="700" height="400"></canvas>
    </div>
    <aside class="game-controls">
      <div class="tower-panel-heading">
        <b>防禦塔庫</b>
        <span class="tower-heading-actions">
          <span id="towerCount">已解鎖 0 座</span>
          <select id="towerSortSelect" aria-label="防禦塔排序方式">
            <option value="cost-asc">造價：低到高</option>
            <option value="cost-desc">造價：高到低</option>
            <option value="damage-desc">傷害：高到低</option>
            <option value="damage-asc">傷害：低到高</option>
          </select>
        </span>
      </div>
      <div id="towerPanel"></div>
      <div class="btn-row">
        <button class="btn-primary" id="btnStartWave">開始波次</button>
        <button class="btn-secondary" id="btnQuitGame">放棄本局</button>
      </div>
      <div class="hint" id="gameHint">點選塔種後，點選地圖上非路徑格子建造。</div>
    </aside>
  </div>
</div>

<div id="overlay-result" class="overlay" hidden>
  <div class="card">
    <h1 id="resultTitle"></h1>
    <p id="resultDetail"></p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-primary" id="btnPlayAgain">返回關卡選擇</button>
    </div>
  </div>
</div>

<script>
// ---------- Animated background (decorative node network) ----------
(function () {
  const bg = document.getElementById('bgFx');
  const bctx = bg.getContext('2d');
  let nodes = [];
  function resize() {
    bg.width = window.innerWidth;
    bg.height = window.innerHeight;
    const count = Math.round((bg.width * bg.height) / 22000);
    nodes = Array.from({ length: count }, () => ({
      x: Math.random() * bg.width,
      y: Math.random() * bg.height,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
    }));
  }
  window.addEventListener('resize', resize);
  resize();
  function frame() {
    bctx.clearRect(0, 0, bg.width, bg.height);
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > bg.width) n.vx *= -1;
      if (n.y < 0 || n.y > bg.height) n.vy *= -1;
    });
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const d = Math.hypot(dx, dy);
        if (d < 130) {
          bctx.strokeStyle = `rgba(77,208,225,${(1 - d / 130) * 0.25})`;
          bctx.lineWidth = 0.6;
          bctx.beginPath(); bctx.moveTo(nodes[i].x, nodes[i].y); bctx.lineTo(nodes[j].x, nodes[j].y); bctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      bctx.fillStyle = 'rgba(77,208,225,0.55)';
      bctx.beginPath(); bctx.arc(n.x, n.y, 1.6, 0, Math.PI * 2); bctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

const screens = {
  start: document.getElementById('screen-start'),
  register: document.getElementById('screen-register'),
  stages: document.getElementById('screen-stages'),
  ranking: document.getElementById('screen-ranking'),
  game: document.getElementById('screen-game'),
};
function showScreen(name) {
  Object.values(screens).forEach(s => s.hidden = true);
  screens[name].hidden = false;
  document.body.classList.toggle('game-active', name === 'game');
  if (name === 'game') requestAnimationFrame(() => window.scrollTo(0, 0));
}

async function api(method, path, body) {
  const headers = {};
  if (body) headers['Content-Type'] = 'application/json';
  if (state.accessToken) headers.Authorization = `Bearer ${state.accessToken}`;
  const res = await fetch(path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const json = await res.json();
  if (!json.success) {
    if (res.status === 401) clearSession();
    const validationDetails = json.data && typeof json.data === 'object'
      ? Object.values(json.data).filter(Boolean).join('、')
      : '';
    throw new Error(validationDetails || json.message || '系統發生錯誤，請稍後再試');
  }
  return json.data;
}

const state = {
  accessToken: localStorage.getItem('machineRiftAccessToken'),
  playerId: null,
  playerName: '',
  stages: [],
  towers: [],
  players: [],
  progress: null,
  selectedStage: null,
  towerSort: 'cost-asc',
};

const TOWER_SORT_OPTIONS = new Set(['cost-asc', 'cost-desc', 'damage-desc', 'damage-asc']);

function loadTowerSortPreference(playerId) {
  const savedSort = localStorage.getItem(`machineRiftTowerSort:${playerId}`);
  return TOWER_SORT_OPTIONS.has(savedSort) ? savedSort : 'cost-asc';
}

function clearSession() {
  localStorage.removeItem('machineRiftAccessToken');
  state.accessToken = null;
  state.playerId = null;
  state.playerName = '';
  state.progress = null;
}

async function enterGame(authData) {
  if (authData?.accessToken) {
    state.accessToken = authData.accessToken;
    localStorage.setItem('machineRiftAccessToken', authData.accessToken);
  }
  const player = authData?.player || authData;
  state.playerId = player.playerId;
  state.playerName = player.playerName;
  state.towerSort = loadTowerSortPreference(player.playerId);
  document.getElementById('currentPlayerName').textContent = player.playerName;
  await loadPlayerContent();
  renderStageList();
  showScreen('stages');
}

async function loadPlayerContent() {
  const [stages, towers, progress] = await Promise.all([
    api('GET', '/api/stages'),
    api('GET', '/api/towers'),
    api('GET', `/api/players/${state.playerId}/progress`),
  ]);
  const stageProgressById = new Map(progress.stages.map(item => [item.stageId, item]));
  const unlockedTowerIds = new Set(
    progress.unlockedTowers.map(item => item.towerId)
  );

  state.progress = progress;
  state.stages = stages
    .map(stage => ({ ...stage, progress: stageProgressById.get(stage.stageId) }));
  state.towers = towers.filter(tower => unlockedTowerIds.has(tower.towerId));
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function formatPlayTime(seconds) {
  const safeSeconds = Math.max(0, Number(seconds) || 0);
  const minutes = Math.floor(safeSeconds / 60);
  const remainder = safeSeconds % 60;
  return minutes > 0 ? `${minutes}分 ${remainder}秒` : `${remainder}秒`;
}

async function openRanking() {
  const listEl = document.getElementById('rankList');
  const statsEl = document.getElementById('rankingStats');
  const podiumEl = document.getElementById('rankPodium');
  statsEl.innerHTML = '';
  podiumEl.innerHTML = '';
  listEl.innerHTML = '<div class="ranking-empty">正在載入排行榜...</div>';
  showScreen('ranking');
  try {
    const [records, players, stages] = await Promise.all([
      api('GET', '/api/rankings'),
      api('GET', '/api/players'),
      api('GET', '/api/stages'),
    ]);
    const nameById = {};
    players.forEach(p => { nameById[p.playerId] = p.playerName; });
    const stageById = {};
    stages.forEach(stage => { stageById[stage.stageId] = stage.stageName; });

    if (records.length === 0) {
      statsEl.innerHTML = `
        <div class="ranking-stat"><span>參賽玩家</span><b>0</b></div>
        <div class="ranking-stat"><span>累積對局</span><b>0</b></div>
        <div class="ranking-stat"><span>目前最高分</span><b>—</b></div>
      `;
      listEl.innerHTML = '<div class="ranking-empty">目前還沒有戰績，完成第一場遊戲就能登上榜單。</div>';
      return;
    }

    const bestByPlayer = new Map();
    records.forEach(record => {
      const current = bestByPlayer.get(record.playerId);
      if (!current || record.score > current.score
          || (record.score === current.score && record.playTime < current.playTime)) {
        bestByPlayer.set(record.playerId, record);
      }
    });
    const ranked = [...bestByPlayer.values()]
      .sort((a, b) => b.score - a.score || a.playTime - b.playTime)
      .slice(0, 10);

    statsEl.innerHTML = `
      <div class="ranking-stat"><span>參賽玩家</span><b>${bestByPlayer.size}</b></div>
      <div class="ranking-stat"><span>累積對局</span><b>${records.length}</b></div>
      <div class="ranking-stat"><span>目前最高分</span><b>${ranked[0].score.toLocaleString()} 分</b></div>
    `;

    const medals = ['🥇', '🥈', '🥉'];
    podiumEl.innerHTML = ranked.slice(0, 3).map((record, index) => {
      const playerName = nameById[record.playerId] || `玩家 ${record.playerId}`;
      const initial = Array.from(playerName.trim())[0] || '?';
      return `
        <div class="podium-card rank-${index + 1}">
          <div class="podium-medal">${medals[index]}</div>
          <div class="rank-avatar">${escapeHtml(initial.toUpperCase())}</div>
          <div class="podium-name" title="${escapeHtml(playerName)}">${escapeHtml(playerName)}</div>
          <div class="podium-score">${record.score.toLocaleString()} 分</div>
          <div class="podium-meta">${escapeHtml(stageById[record.stageId] || `關卡 ${record.stageId}`)}</div>
        </div>
      `;
    }).join('');

    listEl.innerHTML = ranked.map((record, index) => {
      const playerName = nameById[record.playerId] || `玩家 ${record.playerId}`;
      const stageName = stageById[record.stageId] || `關卡 ${record.stageId}`;
      const initial = Array.from(playerName.trim())[0] || '?';
      const resultClass = record.result === 'WIN' ? 'win' : 'lose';
      const resultText = record.result === 'WIN' ? '勝利' : '失敗';
      return `
      <div class="rank-row">
        <div class="rank-position">#${index + 1}</div>
        <div class="rank-avatar">${escapeHtml(initial.toUpperCase())}</div>
        <div>
          <div class="rank-name">${escapeHtml(playerName)}</div>
          <div class="rank-detail">${escapeHtml(stageName)} · ${formatPlayTime(record.playTime)}</div>
        </div>
        <div class="rank-badges">
          <span class="rank-tag">${escapeHtml(stageName)}</span>
          <span class="rank-tag ${resultClass}">${resultText}</span>
        </div>
        <div class="rank-score">${record.score.toLocaleString()} 分</div>
      </div>
    `;
    }).join('');
  } catch (e) {
    statsEl.innerHTML = '';
    podiumEl.innerHTML = '';
    listEl.innerHTML = `<div class="ranking-empty">載入排行榜失敗：${escapeHtml(e.message)}</div>`;
  }
}

// ---------- Game constants ----------
const CELL = 50, COLS = 14, ROWS = 8;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function routeForStage(stage) {
  if (!stage || !Array.isArray(stage.path)) return [];
  return [...stage.path]
    .sort((a, b) => a.pointOrder - b.pointOrder)
    .map(point => ({ c: point.gridCol, r: point.gridRow }));
}

function computePathCells(route) {
  const cells = new Set();
  for (let i = 0; i < route.length - 1; i++) {
    const a = route[i], b = route[i + 1];
    if (a.r === b.r) {
      for (let c = Math.min(a.c, b.c); c <= Math.max(a.c, b.c); c++) cells.add(c + ',' + a.r);
    } else {
      for (let r = Math.min(a.r, b.r); r <= Math.max(a.r, b.r); r++) cells.add(a.c + ',' + r);
    }
  }
  return cells;
}

function buildPathPoints(route) {
  const gridPts = route.map(w => ({ x: w.c * CELL + CELL / 2, y: w.r * CELL + CELL / 2 }));
  // Extend a short spawn/exit segment beyond the first and last waypoint so
  // enemies enter and leave from just off the visible grid.
  const first = gridPts[0], second = gridPts[1];
  const d1 = Math.hypot(first.x - second.x, first.y - second.y) || 1;
  const entry = { x: first.x + (first.x - second.x) / d1 * 40, y: first.y + (first.y - second.y) / d1 * 40 };
  const last = gridPts[gridPts.length - 1], prev = gridPts[gridPts.length - 2];
  const d2 = Math.hypot(last.x - prev.x, last.y - prev.y) || 1;
  const exit = { x: last.x + (last.x - prev.x) / d2 * 40, y: last.y + (last.y - prev.y) / d2 * 40 };
  const waypoints = [entry, ...gridPts, exit];

  const pts = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const a = waypoints[i], b = waypoints[i + 1];
    const d = Math.hypot(b.x - a.x, b.y - a.y);
    const steps = Math.max(1, Math.ceil(d / 4));
    for (let s = 0; s < steps; s++) {
      pts.push({ x: a.x + (b.x - a.x) * s / steps, y: a.y + (b.y - a.y) * s / steps });
    }
  }
  pts.push(waypoints[waypoints.length - 1]);
  return pts;
}

const START_GOLD = 300;
const START_BASE_HP = 10;
const PROJECTILE_SPEED = 320;
const HIT_RADIUS = 8;

let game = null;
let rafId = null;

function startGame() {
  const stage = state.selectedStage;
  const route = routeForStage(stage);
  const waves = [...stage.waves].sort((a, b) => a.waveNumber - b.waveNumber);
  const totalEnemyCount = waves.reduce((total, wave) => total + wave.enemyCount, 0);
  game = {
    gold: START_GOLD,
    baseHp: START_BASE_HP,
    score: 0,
    towers: [],
    enemies: [],
    projectiles: [],
    selectedTowerType: null,
    waveActive: false,
    spawned: 0,
    spawnedInWave: 0,
    enemyCount: totalEnemyCount,
    waves,
    waveIndex: 0,
    spawnTimer: 0,
    lastTs: null,
    startedAt: null,
    ended: false,
    route,
    pathCells: computePathCells(route),
    pathPoints: buildPathPoints(route),
  };
  renderTowerPanel();
  updateHud();
  document.getElementById('gameHint').textContent = '點選塔種後，點選地圖上非路徑格子建造。';
  document.getElementById('btnStartWave').disabled = false;
  showScreen('game');
  draw();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

document.getElementById('btnQuitGame').addEventListener('click', () => {

function sortedTowers() {
  const towers = [...state.towers];
  const comparison = {
    'cost-asc': (left, right) => left.cost - right.cost,
    'cost-desc': (left, right) => right.cost - left.cost,
    'damage-desc': (left, right) => right.damage - left.damage,
    'damage-asc': (left, right) => left.damage - right.damage,
  }[state.towerSort] || ((left, right) => left.cost - right.cost);

  return towers.sort((left, right) =>
    comparison(left, right)
    || left.cost - right.cost
    || left.towerId - right.towerId
  );
}

function renderTowerPanel() {
  const panel = document.getElementById('towerPanel');

        <b>${t.towerName}</b>
        <span class="tower-role">${towerRoleLabel(t.towerType)}</span>
      </span>

        <span>傷 ${t.damage}</span>
        <span>速 ${t.attackSpeed}</span>
        <span>射程 ${t.attackRange}</span>
      </span>
    </button>
  `).join('');
  panel.querySelectorAll('.tower-btn').forEach(btn => {

      });

}

function towerRoleLabel(type) {
  return ({
    RAPID: '快速型',
    GATLING: '極速型',
    BALANCED: '均衡型',
    ARC: '強襲型',
    HEAVY: '重擊型',
    SIEGE: '攻城型',
  })[type] || '標準型';
}

function towerColor(type) {
  return ({
    RAPID: '#4dd0e1',
    GATLING: '#69f0ae',
    BALANCED: '#7c4dff',
    ARC: '#ffca28',
    HEAVY: '#ff7043',
    SIEGE: '#ec407a',
  })[type] || '#4dd0e1';
}

canvas.addEventListener('click', (e) => {
  if (!game || game.ended) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  if (game.pathCells.has(col + ',' + row)) return;
  if (!game.selectedTowerType) return;
  if (game.towers.some(t => t.col === col && t.row === row)) return;
  const cfg = state.towers.find(t => t.towerId === game.selectedTowerType);
  if (!cfg || game.gold < cfg.cost) return;
  game.gold -= cfg.cost;
  game.towers.push({
    col, row,
    x: col * CELL + CELL / 2, y: row * CELL + CELL / 2,
    damage: cfg.damage, attackSpeed: cfg.attackSpeed, range: cfg.attackRange,
    cooldown: 0, name: cfg.towerName, type: cfg.towerType,
  });
  updateHud();
});

document.getElementById('btnStartWave').addEventListener('click', () => {
  if (!game || game.waveActive) return;
  game.waveActive = true;
  game.startedAt = performance.now();
  document.getElementById('btnStartWave').disabled = true;
  document.getElementById('gameHint').textContent = `第 1/${game.waves.length} 波進行中...敵人抵達基地會扣血。`;
});

function spawnEnemy(wave) {
  const start = game.pathPoints[0];
  const config = wave.enemy;
  game.enemies.push({
    x: start.x, y: start.y, pathIdx: 0,
    hp: config.health,
    maxHp: config.health,
    speed: config.speed,
    rewardGold: config.rewardGold,
    name: config.enemyName,
    radius: enemyRadius(config.enemyName),
    alive: true,
  });
  game.spawned++;
  game.spawnedInWave++;
}

function enemyColor(name) {
  return ({
    '偵察機': '#ff7043',
    '裝甲機': '#90a4ae',
    '裂隙核心': '#ab47bc',
    '疾風無人機': '#ffee58',
    '護盾機兵': '#42a5f5',
    '裂隙巨像': '#ec407a',
  })[name] || '#ff5252';
}

function enemyRadius(name) {
  return ({
    '疾風無人機': 7,
    '偵察機': 9,
    '裝甲機': 11,
    '護盾機兵': 13,
    '裂隙核心': 14,
    '裂隙巨像': 18,
  })[name] || 10;
}

function loop(ts) {
  if (!game) return;
  if (game.lastTs == null) game.lastTs = ts;
  const dt = Math.min(50, ts - game.lastTs);
  game.lastTs = ts;

  if (game.waveActive && !game.ended) {
    const currentWave = game.waves[game.waveIndex];
    game.spawnTimer -= dt;
    if (currentWave && game.spawnTimer <= 0 && game.spawnedInWave < currentWave.enemyCount) {
      spawnEnemy(currentWave);
      game.spawnTimer = currentWave.spawnIntervalMs;
    }

    game.enemies.forEach(e => {
      if (!e.alive) return;
      let remaining = e.speed * dt / 1000;
      while (remaining > 0 && e.pathIdx < game.pathPoints.length - 1) {
        const target = game.pathPoints[e.pathIdx + 1];
        const dx = target.x - e.x, dy = target.y - e.y, d = Math.hypot(dx, dy);
        if (d <= remaining) {
          e.x = target.x; e.y = target.y; e.pathIdx++; remaining -= d;
        } else {
          e.x += dx / d * remaining; e.y += dy / d * remaining; remaining = 0;
        }
      }
      if (e.pathIdx >= game.pathPoints.length - 1) {
        e.alive = false;
        game.baseHp--;
        if (game.baseHp <= 0) endGame('LOSE');
      }
    });
    game.enemies = game.enemies.filter(e => e.alive);

    game.towers.forEach(t => {
      t.cooldown -= dt;
      if (t.cooldown > 0) return;
      let target = null, bestProgress = -1;
      game.enemies.forEach(e => {
        const d = Math.hypot(e.x - t.x, e.y - t.y);
        if (d <= t.range && e.pathIdx > bestProgress) { target = e; bestProgress = e.pathIdx; }
      });
      if (target) {
        game.projectiles.push({ x: t.x, y: t.y, target, damage: t.damage });
        t.cooldown = 1000 / t.attackSpeed;
      }
    });

    game.projectiles.forEach(p => {
      if (!p.target.alive) { p.dead = true; return; }
      const dx = p.target.x - p.x, dy = p.target.y - p.y, d = Math.hypot(dx, dy);
      if (d <= HIT_RADIUS) {
        p.target.hp -= p.damage;
        if (p.target.hp <= 0) {
          p.target.alive = false;
          game.gold += p.target.rewardGold;
          game.score += p.target.rewardGold;
        }
        p.dead = true;
      } else {
        p.x += dx / d * PROJECTILE_SPEED * dt / 1000;
        p.y += dy / d * PROJECTILE_SPEED * dt / 1000;
      }
    });
    game.projectiles = game.projectiles.filter(p => !p.dead);

    if (!game.ended && currentWave
        && game.spawnedInWave >= currentWave.enemyCount
        && game.enemies.length === 0) {
      if (game.waveIndex >= game.waves.length - 1) {
        endGame('WIN');
      } else {
        game.waveIndex++;
        game.spawnedInWave = 0;
        game.spawnTimer = 1200;
        document.getElementById('gameHint').textContent =
          `第 ${game.waveIndex + 1}/${game.waves.length} 波即將開始...`;
      }
    }
    updateHud();
  }

  draw();
  if (!game.ended) rafId = requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const onPath = game && game.pathCells.has(c + ',' + r);
      ctx.fillStyle = onPath ? '#2c4468' : ((r + c) % 2 === 0 ? '#12213a' : '#0f1c32');
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, ROWS * CELL); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke(); }

  if (game) {
    const route = game.route;
    const toPx = w => ({ x: w.c * CELL + CELL / 2, y: w.r * CELL + CELL / 2 });
    const p0 = toPx(route[0]), p1 = toPx(route[1]);
    const pl = toPx(route[route.length - 1]);
    const angle = Math.atan2(p1.y - p0.y, p1.x - p0.x);

    // Spawn point — where enemies come from
    ctx.save();
    ctx.translate(p0.x, p0.y);
    ctx.rotate(angle);
    ctx.strokeStyle = '#ff5252'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ff5252'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-4, -8); ctx.lineTo(8, 0); ctx.lineTo(-4, 8);
    ctx.closePath(); ctx.fillStyle = '#ff5252'; ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ff8a80';
    ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('敵人入侵', p0.x, p0.y - 20);

    // Base — what the player is defending
    ctx.save();
    ctx.shadowColor = '#4dd0e1'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#4dd0e1';
    ctx.beginPath();
    ctx.moveTo(pl.x, pl.y - 17);
    ctx.lineTo(pl.x + 15, pl.y - 7);
    ctx.lineTo(pl.x + 15, pl.y + 11);
    ctx.lineTo(pl.x, pl.y + 18);
    ctx.lineTo(pl.x - 15, pl.y + 11);
    ctx.lineTo(pl.x - 15, pl.y - 7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#062028';
    ctx.beginPath(); ctx.arc(pl.x, pl.y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#80deea';
    ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('主堡', pl.x, pl.y - 21);

    game.towers.forEach(t => {
      ctx.fillStyle = towerColor(t.type);
      ctx.beginPath(); ctx.arc(t.x, t.y, 14, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `${towerColor(t.type)}33`;
      ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2); ctx.stroke();
    });
    game.enemies.forEach(e => {
      const healthBarWidth = Math.max(24, e.radius * 2);
      const healthBarX = e.x - healthBarWidth / 2;
      const healthBarY = e.y - e.radius - 8;
      ctx.fillStyle = enemyColor(e.name);
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(healthBarX, healthBarY, healthBarWidth, 4);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(healthBarX, healthBarY, healthBarWidth * (e.hp / e.maxHp), 4);
    });
    game.projectiles.forEach(p => {
      ctx.fillStyle = '#ffe082';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
  }
}

function updateHud() {
  document.getElementById('hudGold').textContent = game.gold;
  const hpEl = document.getElementById('hudHp');
  hpEl.textContent = game.baseHp;
  document.getElementById('hudHpWrap').classList.toggle('hp-low', game.baseHp <= 3);
  document.getElementById('hudScore').textContent = game.score;
  document.getElementById('hudEnemies').textContent = game.spawned + '/' + game.enemyCount;
}

async function endGame(result) {
  if (!game || game.ended) return;
  game.ended = true;
  game.waveActive = false;
  if (result === 'WIN') game.score += state.selectedStage.rewardGold;
  const playTime = game.startedAt ? Math.round((performance.now() - game.startedAt) / 1000) : 0;

  document.getElementById('resultTitle').textContent = result === 'WIN' ? '任務成功' : '任務失敗';
  document.getElementById('resultTitle').className = result === 'WIN' ? 'result-win' : 'result-lose';
  document.getElementById('resultDetail').textContent = `分數：${game.score}　用時：${playTime} 秒`;
  document.getElementById('overlay-result').hidden = false;

  try {
    await api('POST', '/api/game-records', {
      playerId: state.playerId,
      stageId: state.selectedStage.stageId,
      score: game.score,
      result,
      playTime,
    });
    await loadPlayerContent();
    renderStageList();
  } catch (e) {
    document.getElementById('resultDetail').textContent += '（戰績儲存失敗：' + e.message + '）';
  }
}

document.getElementById('btnPlayAgain').addEventListener('click', () => {
  document.getElementById('overlay-result').hidden = true;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  game = null;
  showScreen('stages');
});

// Restore the same player after refreshing or reopening the game.
(async function restoreSession() {
  if (!state.accessToken) return;
  const errEl = document.getElementById('startError');
  errEl.textContent = '正在恢復登入狀態...';
  try {
    await enterGame(await api('GET', '/api/auth/me'));
    errEl.textContent = '';
  } catch (error) {
    clearSession();
    errEl.textContent = '登入已過期，請重新登入。';
  }
})();
</script>
