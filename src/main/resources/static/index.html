<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Rift</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #101c31;
    --panel2: #16233b;
    --accent: #4dd0e1;
    --accent2: #ff8a65;
    --text: #f5f7fb;
    --muted: #9db0c7;
    --good: #4caf50;
    --bad: #ff5252;
  }
  * { box-sizing: border-box; }
  @keyframes bgPan {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, var(--bg), #15243e, #0a1830, var(--bg));
    background-size: 300% 300%;
    animation: bgPan 22s ease-in-out infinite;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }
  #bgFx {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    position: relative;
    z-index: 1;
    width: min(760px, 100%);
    background: rgba(16, 28, 49, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    padding: 32px;
    animation: fadeInUp 0.55s ease-out;
  }
  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 8px rgba(77,208,225,0.35), 0 0 22px rgba(77,208,225,0.15); }
    50% { text-shadow: 0 0 16px rgba(77,208,225,0.65), 0 0 38px rgba(77,208,225,0.35); }
  }
  h1 {
    margin: 0 0 4px;
    font-size: 2.2rem;
    letter-spacing: 0.03em;
    background: linear-gradient(90deg, var(--text), var(--accent), var(--text));
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: titleGlow 3.2s ease-in-out infinite;
  }
  h2 { margin: 0 0 16px; font-size: 1.3rem; color: var(--accent); }
  p { color: var(--muted); line-height: 1.6; }
  .badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(77, 208, 225, 0.15);
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    animation: fadeInUp 0.5s ease-out;
  }
  input[type=text] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--panel2);
    color: var(--text);
    font-size: 1rem;
    margin-bottom: 12px;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 999px;
    padding: 11px 22px;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .btn-primary { background: linear-gradient(90deg, var(--accent), #2bb6cb); color: #051018; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .error-text { color: var(--bad); min-height: 20px; font-size: 0.9rem; }
  .stage-list, .rank-list { display: grid; gap: 10px; margin-bottom: 16px; }
  .stage-card {
    background: var(--panel2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.2s;
  }
  .stage-card:hover { border-color: var(--accent); }
  .stage-card .name { font-weight: 700; }
  .stage-card .meta { color: var(--muted); font-size: 0.85rem; }
  .rank-row {
    display: flex;
    justify-content: space-between;
    background: var(--panel2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.9rem;
  }
  .rank-row .rank-name { color: var(--text); }
  .rank-row .rank-score { color: var(--accent); font-weight: 700; }
  #hud {
    display: flex;
    gap: 22px;
    margin-bottom: 10px;
    font-size: 0.95rem;
  }
  #hud span b { color: var(--accent); }
  #hud .hp-low b { color: var(--bad); }
  #gameCanvas {
    display: block;
    width: 100%;
    max-width: 700px;
    background: #0c1930;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: crosshair;
  }
  #towerPanel { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .tower-btn {
    background: var(--panel2);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.85rem;
    min-width: 110px;
  }
  .tower-btn b { display: block; font-size: 0.95rem; margin-bottom: 2px; }
  .tower-btn.selected { border-color: var(--accent); background: rgba(77,208,225,0.12); }
  .tower-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .hint { font-size: 0.85rem; color: var(--muted); margin-top: 10px; min-height: 18px; }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(5,10,20,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  .overlay .card { text-align: center; }
  .result-win { color: var(--good); }
  .result-lose { color: var(--bad); }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<canvas id="bgFx"></canvas>

<div id="screen-start" class="card">
  <span class="badge">Machine Rift · Demo</span>
  <h1>Machine Rift</h1>
  <p>塔防遊戲最小可玩切片。輸入玩家名稱以連線後端 API 開始遊戲。</p>
  <input type="text" id="playerNameInput" placeholder="輸入玩家名稱" maxlength="100">
  <div class="btn-row">
    <button class="btn-primary" id="btnStart">開始</button>
    <button class="btn-secondary" id="btnShowRanking">查看排行榜</button>
  </div>
  <div class="error-text" id="startError"></div>
</div>

<div id="screen-stages" class="card" hidden>
  <h2>選擇關卡</h2>
  <div class="stage-list" id="stageList"></div>
  <div class="btn-row">
    <button class="btn-secondary" id="btnBackToStart">返回</button>
  </div>
</div>

<div id="screen-ranking" class="card" hidden>
  <h2>排行榜</h2>
  <div class="rank-list" id="rankList"></div>
  <div class="btn-row">
    <button class="btn-secondary" id="btnBackFromRanking">返回</button>
  </div>
</div>

<div id="screen-game" class="card" hidden style="width:min(760px,100%)">
  <div id="hud">
    <span>金幣 <b id="hudGold">0</b></span>
    <span id="hudHpWrap">基地血量 <b id="hudHp">0</b></span>
    <span>分數 <b id="hudScore">0</b></span>
    <span>敵人 <b id="hudEnemies">0/0</b></span>
  </div>
  <canvas id="gameCanvas" width="700" height="400"></canvas>
  <div id="towerPanel"></div>
  <div class="btn-row">
    <button class="btn-primary" id="btnStartWave">開始波次</button>
    <button class="btn-secondary" id="btnQuitGame">放棄本局</button>
  </div>
  <div class="hint" id="gameHint">點選塔種後，點選地圖上非路徑格子建造。</div>
</div>

<div id="overlay-result" class="overlay" hidden>
  <div class="card">
    <h1 id="resultTitle"></h1>
    <p id="resultDetail"></p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-primary" id="btnPlayAgain">返回關卡選擇</button>
    </div>
  </div>
</div>

<script>
// ---------- Animated background (decorative node network) ----------
(function () {
  const bg = document.getElementById('bgFx');
  const bctx = bg.getContext('2d');
  let nodes = [];
  function resize() {
    bg.width = window.innerWidth;
    bg.height = window.innerHeight;
    const count = Math.round((bg.width * bg.height) / 22000);
    nodes = Array.from({ length: count }, () => ({
      x: Math.random() * bg.width,
      y: Math.random() * bg.height,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
    }));
  }
  window.addEventListener('resize', resize);
  resize();
  function frame() {
    bctx.clearRect(0, 0, bg.width, bg.height);
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > bg.width) n.vx *= -1;
      if (n.y < 0 || n.y > bg.height) n.vy *= -1;
    });
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const d = Math.hypot(dx, dy);
        if (d < 130) {
          bctx.strokeStyle = `rgba(77,208,225,${(1 - d / 130) * 0.25})`;
          bctx.lineWidth = 0.6;
          bctx.beginPath(); bctx.moveTo(nodes[i].x, nodes[i].y); bctx.lineTo(nodes[j].x, nodes[j].y); bctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      bctx.fillStyle = 'rgba(77,208,225,0.55)';
      bctx.beginPath(); bctx.arc(n.x, n.y, 1.6, 0, Math.PI * 2); bctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

const screens = {
  start: document.getElementById('screen-start'),
  stages: document.getElementById('screen-stages'),
  ranking: document.getElementById('screen-ranking'),
  game: document.getElementById('screen-game'),
};
function showScreen(name) {
  Object.values(screens).forEach(s => s.hidden = true);
  screens[name].hidden = false;
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.message || 'API 發生錯誤');
  return json.data;
}

const state = {
  playerId: null,
  playerName: '',
  stages: [],
  towers: [],
  players: [],
  selectedStage: null,
};

// ---------- Start screen ----------
document.getElementById('btnStart').addEventListener('click', async () => {
  const name = document.getElementById('playerNameInput').value.trim();
  const errEl = document.getElementById('startError');
  errEl.textContent = '';
  if (!name) { errEl.textContent = '請輸入玩家名稱'; return; }
  try {
    const player = await api('POST', '/api/players', { playerName: name, level: 1 });
    state.playerId = player.playerId;
    state.playerName = player.playerName;
    const [stages, towers] = await Promise.all([
      api('GET', '/api/stages'),
      api('GET', '/api/towers'),
    ]);
    state.stages = stages;
    state.towers = towers;
    renderStageList();
    showScreen('stages');
  } catch (e) {
    errEl.textContent = '連線後端失敗：' + e.message + '（請確認服務已啟動）';
  }
});

document.getElementById('btnShowRanking').addEventListener('click', async () => {
  await openRanking();
});
document.getElementById('btnBackFromRanking').addEventListener('click', () => showScreen('start'));
document.getElementById('btnBackToStart').addEventListener('click', () => showScreen('start'));

async function openRanking() {
  const listEl = document.getElementById('rankList');
  listEl.innerHTML = '<p>載入中...</p>';
  showScreen('ranking');
  try {
    const [records, players] = await Promise.all([
      api('GET', '/api/rankings'),
      api('GET', '/api/players'),
    ]);
    const nameById = {};
    players.forEach(p => { nameById[p.playerId] = p.playerName; });
    if (records.length === 0) {
      listEl.innerHTML = '<p>目前還沒有任何戰績。</p>';
      return;
    }
    listEl.innerHTML = records.slice(0, 10).map((r, i) => `
      <div class="rank-row">
        <span class="rank-name">#${i + 1} ${nameById[r.playerId] || ('玩家 ' + r.playerId)} (${r.result})</span>
        <span class="rank-score">${r.score} 分</span>
      </div>
    `).join('');
  } catch (e) {
    listEl.innerHTML = '<p>載入排行榜失敗：' + e.message + '</p>';
  }
}

// ---------- Stage select ----------
function renderStageList() {
  const listEl = document.getElementById('stageList');
  listEl.innerHTML = state.stages.map(s => {
    const ready = Array.isArray(s.path) && s.path.length >= 2
      && Array.isArray(s.waves) && s.waves.length > 0;
    return `
    <div class="stage-card" data-id="${s.stageId}">
      <div>
        <div class="name">${s.stageName}</div>
        <div class="meta">難度：${s.difficulty} · 敵人數：${s.enemyCount} · 波次：${s.waves?.length || 0} · 獎勵金幣：${s.rewardGold}</div>
      </div>
      <button class="btn-primary" ${ready ? '' : 'disabled'}>${ready ? '開始' : '尚未設定'}</button>
    </div>
  `;
  }).join('');
  listEl.querySelectorAll('.stage-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = Number(card.dataset.id);
      const stage = state.stages.find(s => s.stageId === id);
      if (!stage || !Array.isArray(stage.path) || stage.path.length < 2
          || !Array.isArray(stage.waves) || stage.waves.length === 0) return;
      state.selectedStage = stage;
      startGame();
    });
  });
}

// ---------- Game constants ----------
const CELL = 50, COLS = 14, ROWS = 8;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function routeForStage(stage) {
  if (!stage || !Array.isArray(stage.path)) return [];
  return [...stage.path]
    .sort((a, b) => a.pointOrder - b.pointOrder)
    .map(point => ({ c: point.gridCol, r: point.gridRow }));
}

function computePathCells(route) {
  const cells = new Set();
  for (let i = 0; i < route.length - 1; i++) {
    const a = route[i], b = route[i + 1];
    if (a.r === b.r) {
      for (let c = Math.min(a.c, b.c); c <= Math.max(a.c, b.c); c++) cells.add(c + ',' + a.r);
    } else {
      for (let r = Math.min(a.r, b.r); r <= Math.max(a.r, b.r); r++) cells.add(a.c + ',' + r);
    }
  }
  return cells;
}

function buildPathPoints(route) {
  const gridPts = route.map(w => ({ x: w.c * CELL + CELL / 2, y: w.r * CELL + CELL / 2 }));
  // Extend a short spawn/exit segment beyond the first and last waypoint so
  // enemies enter and leave from just off the visible grid.
  const first = gridPts[0], second = gridPts[1];
  const d1 = Math.hypot(first.x - second.x, first.y - second.y) || 1;
  const entry = { x: first.x + (first.x - second.x) / d1 * 40, y: first.y + (first.y - second.y) / d1 * 40 };
  const last = gridPts[gridPts.length - 1], prev = gridPts[gridPts.length - 2];
  const d2 = Math.hypot(last.x - prev.x, last.y - prev.y) || 1;
  const exit = { x: last.x + (last.x - prev.x) / d2 * 40, y: last.y + (last.y - prev.y) / d2 * 40 };
  const waypoints = [entry, ...gridPts, exit];

  const pts = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const a = waypoints[i], b = waypoints[i + 1];
    const d = Math.hypot(b.x - a.x, b.y - a.y);
    const steps = Math.max(1, Math.ceil(d / 4));
    for (let s = 0; s < steps; s++) {
      pts.push({ x: a.x + (b.x - a.x) * s / steps, y: a.y + (b.y - a.y) * s / steps });
    }
  }
  pts.push(waypoints[waypoints.length - 1]);
  return pts;
}

const START_GOLD = 300;
const START_BASE_HP = 10;
const PROJECTILE_SPEED = 320;
const HIT_RADIUS = 8;

let game = null;
let rafId = null;

function startGame() {
  const stage = state.selectedStage;
  const route = routeForStage(stage);
  const waves = [...stage.waves].sort((a, b) => a.waveNumber - b.waveNumber);
  const totalEnemyCount = waves.reduce((total, wave) => total + wave.enemyCount, 0);
  game = {
    gold: START_GOLD,
    baseHp: START_BASE_HP,
    score: 0,
    towers: [],
    enemies: [],
    projectiles: [],
    selectedTowerType: null,
    waveActive: false,
    spawned: 0,
    spawnedInWave: 0,
    enemyCount: totalEnemyCount,
    waves,
    waveIndex: 0,
    spawnTimer: 0,
    lastTs: null,
    startedAt: null,
    ended: false,
    route,
    pathCells: computePathCells(route),
    pathPoints: buildPathPoints(route),
  };
  renderTowerPanel();
  updateHud();
  document.getElementById('gameHint').textContent = '點選塔種後，點選地圖上非路徑格子建造。';
  document.getElementById('btnStartWave').disabled = false;
  showScreen('game');
  draw();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

document.getElementById('btnQuitGame').addEventListener('click', () => {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  game = null;
  showScreen('stages');
});

function renderTowerPanel() {
  const panel = document.getElementById('towerPanel');
  panel.innerHTML = state.towers.map(t => `
    <button class="tower-btn" data-id="${t.towerId}">
      <b>${t.towerName}</b>
      造價 ${t.cost}G<br>傷害 ${t.damage} / 射程 ${t.attackRange}
    </button>
  `).join('');
  panel.querySelectorAll('.tower-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = Number(btn.dataset.id);
      game.selectedTowerType = game.selectedTowerType === id ? null : id;
      panel.querySelectorAll('.tower-btn').forEach(b => {
        b.classList.toggle('selected', Number(b.dataset.id) === game.selectedTowerType);
      });
    });
  });
}

canvas.addEventListener('click', (e) => {
  if (!game || game.ended) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  if (game.pathCells.has(col + ',' + row)) return;
  if (!game.selectedTowerType) return;
  if (game.towers.some(t => t.col === col && t.row === row)) return;
  const cfg = state.towers.find(t => t.towerId === game.selectedTowerType);
  if (!cfg || game.gold < cfg.cost) return;
  game.gold -= cfg.cost;
  game.towers.push({
    col, row,
    x: col * CELL + CELL / 2, y: row * CELL + CELL / 2,
    damage: cfg.damage, attackSpeed: cfg.attackSpeed, range: cfg.attackRange,
    cooldown: 0, name: cfg.towerName,
  });
  updateHud();
});

document.getElementById('btnStartWave').addEventListener('click', () => {
  if (!game || game.waveActive) return;
  game.waveActive = true;
  game.startedAt = performance.now();
  document.getElementById('btnStartWave').disabled = true;
  document.getElementById('gameHint').textContent = `第 1/${game.waves.length} 波進行中...敵人抵達基地會扣血。`;
});

function spawnEnemy(wave) {
  const start = game.pathPoints[0];
  const config = wave.enemy;
  game.enemies.push({
    x: start.x, y: start.y, pathIdx: 0,
    hp: config.health,
    maxHp: config.health,
    speed: config.speed,
    rewardGold: config.rewardGold,
    name: config.enemyName,
    alive: true,
  });
  game.spawned++;
  game.spawnedInWave++;
}

function loop(ts) {
  if (!game) return;
  if (game.lastTs == null) game.lastTs = ts;
  const dt = Math.min(50, ts - game.lastTs);
  game.lastTs = ts;

  if (game.waveActive && !game.ended) {
    const currentWave = game.waves[game.waveIndex];
    game.spawnTimer -= dt;
    if (currentWave && game.spawnTimer <= 0 && game.spawnedInWave < currentWave.enemyCount) {
      spawnEnemy(currentWave);
      game.spawnTimer = currentWave.spawnIntervalMs;
    }

    game.enemies.forEach(e => {
      if (!e.alive) return;
      let remaining = e.speed * dt / 1000;
      while (remaining > 0 && e.pathIdx < game.pathPoints.length - 1) {
        const target = game.pathPoints[e.pathIdx + 1];
        const dx = target.x - e.x, dy = target.y - e.y, d = Math.hypot(dx, dy);
        if (d <= remaining) {
          e.x = target.x; e.y = target.y; e.pathIdx++; remaining -= d;
        } else {
          e.x += dx / d * remaining; e.y += dy / d * remaining; remaining = 0;
        }
      }
      if (e.pathIdx >= game.pathPoints.length - 1) {
        e.alive = false;
        game.baseHp--;
        if (game.baseHp <= 0) endGame('LOSE');
      }
    });
    game.enemies = game.enemies.filter(e => e.alive);

    game.towers.forEach(t => {
      t.cooldown -= dt;
      if (t.cooldown > 0) return;
      let target = null, bestProgress = -1;
      game.enemies.forEach(e => {
        const d = Math.hypot(e.x - t.x, e.y - t.y);
        if (d <= t.range && e.pathIdx > bestProgress) { target = e; bestProgress = e.pathIdx; }
      });
      if (target) {
        game.projectiles.push({ x: t.x, y: t.y, target, damage: t.damage });
        t.cooldown = 1000 / t.attackSpeed;
      }
    });

    game.projectiles.forEach(p => {
      if (!p.target.alive) { p.dead = true; return; }
      const dx = p.target.x - p.x, dy = p.target.y - p.y, d = Math.hypot(dx, dy);
      if (d <= HIT_RADIUS) {
        p.target.hp -= p.damage;
        if (p.target.hp <= 0) {
          p.target.alive = false;
          game.gold += p.target.rewardGold;
          game.score += p.target.rewardGold;
        }
        p.dead = true;
      } else {
        p.x += dx / d * PROJECTILE_SPEED * dt / 1000;
        p.y += dy / d * PROJECTILE_SPEED * dt / 1000;
      }
    });
    game.projectiles = game.projectiles.filter(p => !p.dead);

    if (!game.ended && currentWave
        && game.spawnedInWave >= currentWave.enemyCount
        && game.enemies.length === 0) {
      if (game.waveIndex >= game.waves.length - 1) {
        endGame('WIN');
      } else {
        game.waveIndex++;
        game.spawnedInWave = 0;
        game.spawnTimer = 1200;
        document.getElementById('gameHint').textContent =
          `第 ${game.waveIndex + 1}/${game.waves.length} 波即將開始...`;
      }
    }
    updateHud();
  }

  draw();
  if (!game.ended) rafId = requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const onPath = game && game.pathCells.has(c + ',' + r);
      ctx.fillStyle = onPath ? '#2c4468' : ((r + c) % 2 === 0 ? '#12213a' : '#0f1c32');
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, ROWS * CELL); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke(); }

  if (game) {
    const route = game.route;
    const toPx = w => ({ x: w.c * CELL + CELL / 2, y: w.r * CELL + CELL / 2 });
    const p0 = toPx(route[0]), p1 = toPx(route[1]);
    const pl = toPx(route[route.length - 1]);
    const angle = Math.atan2(p1.y - p0.y, p1.x - p0.x);

    // Spawn point — where enemies come from
    ctx.save();
    ctx.translate(p0.x, p0.y);
    ctx.rotate(angle);
    ctx.strokeStyle = '#ff5252'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ff5252'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-4, -8); ctx.lineTo(8, 0); ctx.lineTo(-4, 8);
    ctx.closePath(); ctx.fillStyle = '#ff5252'; ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ff8a80';
    ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('敵人入侵', p0.x, p0.y - 20);

    // Base — what the player is defending
    ctx.save();
    ctx.shadowColor = '#4dd0e1'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#4dd0e1';
    ctx.beginPath();
    ctx.moveTo(pl.x, pl.y - 17);
    ctx.lineTo(pl.x + 15, pl.y - 7);
    ctx.lineTo(pl.x + 15, pl.y + 11);
    ctx.lineTo(pl.x, pl.y + 18);
    ctx.lineTo(pl.x - 15, pl.y + 11);
    ctx.lineTo(pl.x - 15, pl.y - 7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#062028';
    ctx.beginPath(); ctx.arc(pl.x, pl.y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#80deea';
    ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('主堡', pl.x, pl.y - 21);

    game.towers.forEach(t => {
      ctx.fillStyle = '#4dd0e1';
      ctx.beginPath(); ctx.arc(t.x, t.y, 14, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(77,208,225,0.15)';
      ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2); ctx.stroke();
    });
    game.enemies.forEach(e => {
      ctx.fillStyle = '#ff5252';
      ctx.beginPath(); ctx.arc(e.x, e.y, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(e.x - 12, e.y - 18, 24, 4);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(e.x - 12, e.y - 18, 24 * (e.hp / e.maxHp), 4);
    });
    game.projectiles.forEach(p => {
      ctx.fillStyle = '#ffe082';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    });
  }
}

function updateHud() {
  document.getElementById('hudGold').textContent = game.gold;
  const hpEl = document.getElementById('hudHp');
  hpEl.textContent = game.baseHp;
  document.getElementById('hudHpWrap').classList.toggle('hp-low', game.baseHp <= 3);
  document.getElementById('hudScore').textContent = game.score;
  document.getElementById('hudEnemies').textContent = game.spawned + '/' + game.enemyCount;
}

async function endGame(result) {
  if (!game || game.ended) return;
  game.ended = true;
  game.waveActive = false;
  if (result === 'WIN') game.score += state.selectedStage.rewardGold;
  const playTime = game.startedAt ? Math.round((performance.now() - game.startedAt) / 1000) : 0;

  document.getElementById('resultTitle').textContent = result === 'WIN' ? '任務成功' : '任務失敗';
  document.getElementById('resultTitle').className = result === 'WIN' ? 'result-win' : 'result-lose';
  document.getElementById('resultDetail').textContent = `分數：${game.score}　用時：${playTime} 秒`;
  document.getElementById('overlay-result').hidden = false;

  try {
    await api('POST', '/api/game-records', {
      playerId: state.playerId,
      stageId: state.selectedStage.stageId,
      score: game.score,
      result,
      playTime,
    });
  } catch (e) {
    document.getElementById('resultDetail').textContent += '（戰績儲存失敗：' + e.message + '）';
  }
}

document.getElementById('btnPlayAgain').addEventListener('click', () => {
  document.getElementById('overlay-result').hidden = true;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  game = null;
  showScreen('stages');
});
</script>
</body>
